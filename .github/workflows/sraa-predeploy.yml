# [F015][S006] SRAA — Security Risk Assessment gate before merge/deploy
name: SRAA Pre-Deploy Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit fix (safe)
        run: npm audit fix || true

      - name: npm audit gate (high/critical)
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build
